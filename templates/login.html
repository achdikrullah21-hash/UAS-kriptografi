<!DOCTYPE html>
<html>
<head>
<title>Login Sistem</title>
</head>
<body>

<h1>Simpan Akun Game</h1>

<form action="/simpan" method="POST">

<input
type="text"
name="game"
placeholder="Nama Game"
required>

<br><br>

<input
type="text"
name="username"
placeholder="Username"
required>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required>

<br><br>

<input
type="password"
name="master"
placeholder="Master Password"
required>

<br><br>

<button type="submit">
SIMPAN AKUN
</button>

</form>

<br>

<a href="/">
Kembali
</a>

</body>
</html>
